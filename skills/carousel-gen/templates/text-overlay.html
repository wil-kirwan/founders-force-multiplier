<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @font-face {
    font-family: 'Playfair Display';
    src: url('{{FONT_PATH}}/PlayfairDisplay-Variable.ttf') format('truetype');
    font-weight: 100 900;
    font-style: normal;
  }
  @font-face {
    font-family: 'Playfair Display';
    src: url('{{FONT_PATH}}/PlayfairDisplay-Italic-Variable.ttf') format('truetype');
    font-weight: 100 900;
    font-style: italic;
  }
  @font-face {
    font-family: 'Plus Jakarta Sans';
    src: url('{{FONT_PATH}}/PlusJakartaSans-Variable.ttf') format('truetype');
    font-weight: 100 900;
    font-style: normal;
  }
  @font-face {
    font-family: 'JetBrains Mono';
    src: url('{{FONT_PATH}}/JetBrainsMono-Variable.ttf') format('truetype');
    font-weight: 100 900;
    font-style: normal;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1350px;
    background: transparent;
    overflow: hidden;
    position: relative;
  }

  .slide {
    width: 1080px;
    height: 1350px;
    padding: 50px 60px;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  /* Text background strip for readability over dense visuals */
  .text-bg {
    background: rgba(245, 242, 237, 0.92);
    padding: 16px 24px;
    border-radius: 8px;
    margin-bottom: 8px;
  }

  /* Zone: Step/Label - top left */
  .label {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 14px;
    font-weight: 800;
    color: {{LABEL_COLOR}};
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-bottom: 8px;
  }

  /* Zone: Headline */
  .headline {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: {{HEADLINE_SIZE}};
    font-weight: 800;
    color: {{HEADLINE_COLOR}};
    line-height: 1.15;
    margin-bottom: 16px;
    max-width: 900px;
  }

  .headline .accent {
    color: {{ACCENT_COLOR}};
  }

  .headline .highlight {
    background: {{ACCENT_COLOR}}33;
    padding: 2px 8px;
    border-radius: 4px;
  }

  /* Zone: Body */
  .body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: {{BODY_SIZE}};
    font-weight: 400;
    color: {{BODY_COLOR}};
    line-height: 1.6;
    max-width: 880px;
  }

  .body strong {
    font-weight: 600;
  }

  .body code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px;
    background: rgba(0,0,0,0.06);
    padding: 2px 6px;
    border-radius: 3px;
  }

  /* Zone: Subtext/Tip */
  .subtext {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 20px;
    font-weight: 400;
    color: #6B6560;
    line-height: 1.5;
    margin-top: 16px;
  }

  /* Zone: Code block text */
  .code-block {
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    font-weight: 400;
    color: #E0E0E0;
    line-height: 1.7;
    white-space: pre-wrap;
    padding: 48px 24px 24px 24px;
    position: absolute;
    /* Position matches the dark terminal block in visual layer */
    left: {{CODE_LEFT}};
    top: {{CODE_TOP}};
    width: {{CODE_WIDTH}};
  }

  .code-block .prompt { color: #27C93F; }
  .code-block .comment { color: #6B7280; }
  .code-block .string { color: #E8836B; }
  .code-block .keyword { color: #9B8FE8; }

  /* Zone: Checklist items */
  .checklist {
    list-style: none;
    padding: 0;
  }

  .checklist li {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 24px;
    font-weight: 400;
    color: #2C2926;
    line-height: 1.5;
    padding: 16px 0;
    padding-left: 40px;
    position: relative;
  }

  .checklist li.highlighted {
    font-weight: 600;
    color: {{ACCENT_COLOR}};
  }

  /* Zone: Data/Stats callout */
  .stat-big {
    font-family: 'Playfair Display', serif;
    font-size: 72px;
    font-weight: 900;
    color: {{ACCENT_COLOR}};
    line-height: 1;
  }

  .stat-label {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 20px;
    font-weight: 500;
    color: #6B6560;
    margin-top: 8px;
  }

  /* Zone: Handle - bottom right */
  .handle {
    position: absolute;
    bottom: 50px;
    right: 60px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 16px;
    font-weight: 500;
    color: #6B6560;
  }

  /* Zone: Swipe cue - bottom right */
  .swipe-cue {
    position: absolute;
    bottom: 50px;
    left: 60px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: #9B9590;
    letter-spacing: 1px;
  }

  /* Zone: Progress dots - bottom center */
  .progress {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 6px;
  }

  .progress .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #D1CCC7;
  }

  .progress .dot.active {
    background: {{ACCENT_COLOR}};
  }

  /* Spacer to push content down or create gaps */
  .spacer { flex-grow: 1; }
  .spacer-fixed { height: {{SPACER_HEIGHT}}; }

  /* CTA specific */
  .cta-headline {
    font-family: 'Playfair Display', serif;
    font-size: 56px;
    font-weight: 700;
    color: #2C2926;
    line-height: 1.2;
    text-align: center;
    max-width: 800px;
    margin: 0 auto;
  }

  .cta-handle {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 28px;
    font-weight: 600;
    color: {{ACCENT_COLOR}};
    text-align: center;
    margin-top: 24px;
  }
</style>
</head>
<body>
<div class="slide">
  {{CONTENT}}
</div>
</body>
</html>
